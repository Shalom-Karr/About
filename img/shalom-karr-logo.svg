<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Inter:wght@400;600;800&amp;display=swap');
    </style>

    <!-- Base Dark Background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- Blur Filter for Blobs -->
    <filter id="blurFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80" />
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    </pattern>

    <!-- Glass Panel Drop Shadow -->
    <filter id="glassShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    
    <!-- Image Mask (Rounded Rectangle) -->
    <clipPath id="imageMask">
      <rect x="0" y="0" width="320" height="600" />
    </clipPath>
  </defs>

  <!-- 1. Background Fill -->
  <rect width="1050" height="600" fill="url(#bgGradient)" rx="24" />

  <!-- 2. Animated/Blurred Blobs -->
  <circle cx="500" cy="100" r="250" fill="#581c87" filter="url(#blurFilter)" opacity="0.4" style="mix-blend-mode: screen;" />
  <circle cx="800" cy="500" r="250" fill="#1e3a8a" filter="url(#blurFilter)" opacity="0.4" style="mix-blend-mode: screen;" />

  <!-- 3. Grid Overlay -->
  <rect width="1050" height="600" fill="url(#grid)" rx="24" />
  
  <!-- 4. Outer Border -->
  <rect x="2" y="2" width="1046" height="596" rx="22" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

  <!-- 5. Profile Image (Left Side) -->
  <g clip-path="url(#imageMask)">
    <image href="https://raw.githubusercontent.com/Shalom-Karr/About/refs/heads/main/img/ShalomProfessional.jpg" x="-50" y="0" width="450" height="600" preserveAspectRatio="xMidYMid slice" />
    <!-- Gradient Fade over image -->
    <rect x="0" y="0" width="320" height="600" fill="url(#bgGradient)" opacity="0.3" />
    <!-- Vertical Divider Line -->
    <line x1="320" y1="0" x2="320" y2="600" stroke="#3b82f6" stroke-width="4" opacity="0.8" />
  </g>

  <!-- 6. Content Section (Right Side) -->
  <g transform="translate(380, 0)">
    
    <!-- Decorative Accent Dots (Top Right) -->
    <circle cx="600" cy="60" r="6" fill="#3b82f6" />
    <circle cx="575" cy="60" r="6" fill="#3b82f6" opacity="0.6" />
    <circle cx="550" cy="60" r="6" fill="#3b82f6" opacity="0.3" />

    <!-- Name and Title -->
    <g transform="translate(0, 240)">
      <!-- Cursive Name -->
      <text x="0" y="0" font-family="'Great Vibes', cursive" font-size="110" fill="#ffffff">
        Shalom Karr
      </text>

      <!-- Title / Subtitle in Inter -->
      <text x="5" y="70" font-family="'Inter', sans-serif" font-size="18" font-weight="800" fill="#3b82f6" letter-spacing="4" text-transform="uppercase">
        FULL-STACK DEVELOPER &amp; AI ENGINEER
      </text>

      <!-- Horizontal Divider -->
      <line x1="5" y1="110" x2="100" y2="110" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
    </g>

    <!-- Footer Links / Contact Info -->
    <g transform="translate(5, 430)" font-family="'Inter', sans-serif" font-size="18" font-weight="500" fill="#8b949e">
      
      <!-- Website -->
      <g transform="translate(0, 0)">
        <text x="0" y="0" fill="#3b82f6">🌐</text>
        <text x="35" y="0">shalomkarr.pages.dev</text>
      </g>
      
      <!-- Email -->
      <g transform="translate(0, 45)">
        <text x="0" y="0" fill="#3b82f6">✉️</text>
        <text x="35" y="0">shalomkarr@gmail.com</text>
      </g>
      
      <!-- Phone -->
      <g transform="translate(0, 90)">
        <text x="0" y="0" fill="#3b82f6">📱</text>
        <text x="35" y="0">(216) 451-6698</text>
      </g>

    </g>

    <!-- Real QR Code for shalomkarr.pages.dev (Bottom Right) -->
    <g transform="translate(530, 410)">
      <g transform="scale(2.5)">
          <!-- Background for QR Code (for scanning contrast) -->
          <rect x="0" y="0" width="37" height="37" rx="2" fill="#ffffff" opacity="0.1" />
          <!-- The actual QR code path data mapped to #ffffff for visibility against the dark background -->
          <path fill="none" stroke="#ffffff" stroke-width="1" shape-rendering="crispEdges" opacity="0.9" d="M4 4.5h7m6 0h1m2 0h1m1 0h2m2 0h7M4 5.5h1m5 0h1m1 0h2m1 0h2m1 0h7m1 0h1m5 0h1M4 6.5h1m1 0h3m1 0h1m3 0h1m1 0h3m1 0h1m2 0h1m2 0h1m1 0h3m1 0h1M4 7.5h1m1 0h3m1 0h1m2 0h7m2 0h2m2 0h1m1 0h3m1 0h1M4 8.5h1m1 0h3m1 0h1m1 0h2m1 0h1m2 0h1m4 0h1m2 0h1m1 0h3m1 0h1M4 9.5h1m5 0h1m4 0h3m5 0h2m1 0h1m5 0h1M4 10.5h7m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h7M14 11.5h1m2 0h2m1 0h4M4 12.5h1m1 0h1m1 0h1m1 0h1m2 0h1m4 0h2m1 0h2m1 0h1m3 0h1m2 0h1M5 13.5h5m1 0h2m1 0h2m2 0h2m4 0h3m2 0h1m2 0h1M4 14.5h3m1 0h1m1 0h2m1 0h5m3 0h1m2 0h2m2 0h1m1 0h3M9 15.5h1m2 0h2m5 0h1m1 0h1m1 0h1m2 0h1m1 0h1m2 0h1M5 16.5h1m1 0h5m1 0h2m5 0h2m3 0h2m2 0h1m1 0h2M6 17.5h3m2 0h1m1 0h5m1 0h3m2 0h3m2 0h1m2 0h1M5 18.5h4m1 0h5m1 0h1m1 0h3m3 0h2m1 0h3m1 0h2M9 19.5h1m4 0h2m1 0h2m1 0h2m2 0h1m2 0h1m1 0h1m1 0h1M5 20.5h1m1 0h1m1 0h3m1 0h1m1 0h1m2 0h2m1 0h1m1 0h4m2 0h1m1 0h2M7 21.5h3m1 0h1m3 0h1m2 0h2m1 0h1m3 0h2m2 0h2m1 0h1M4 22.5h1m2 0h6m1 0h1m1 0h2m6 0h1m3 0h1m2 0h2M5 23.5h5m4 0h3m2 0h1m1 0h2m3 0h4m1 0h1M4 24.5h1m1 0h2m1 0h2m2 0h1m2 0h1m3 0h2m2 0h5M12 25.5h1m1 0h1m1 0h2m1 0h4m1 0h1m3 0h1m1 0h3M4 26.5h7m2 0h1m1 0h1m2 0h4m1 0h2m1 0h1m1 0h2m1 0h2M4 27.5h1m5 0h1m3 0h5m1 0h2m2 0h1m3 0h2m1 0h1M4 28.5h1m1 0h3m1 0h1m1 0h3m1 0h1m1 0h2m2 0h1m1 0h5m2 0h1M4 29.5h1m1 0h3m1 0h1m2 0h3m2 0h2m3 0h2m2 0h2m1 0h1M4 30.5h1m1 0h3m1 0h1m1 0h1m1 0h1m1 0h3m2 0h1m2 0h1m2 0h3m2 0h1M4 31.5h1m5 0h1m2 0h2m2 0h1m1 0h1m4 0h2m2 0h1m2 0h1M4 32.5h7m1 0h1m3 0h2m2 0h1m2 0h4m1 0h2m1 0h2"/>
      </g>
    </g>

  </g>

</svg>

