<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&amp;family=Inter:wght@400;600;800&amp;display=swap');
    </style>

    <!-- Base Dark Background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- Blur Filter for Blobs -->
    <filter id="blurFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80" />
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    </pattern>

    <!-- Glass Panel Drop Shadow -->
    <filter id="glassShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Image Mask (Circle) -->
    <clipPath id="imageMask">
      <circle cx="400" cy="280" r="160" />
    </clipPath>
  </defs>

  <!-- 1. Background Fill -->
  <rect width="800" height="800" fill="url(#bgGradient)" rx="32" />

  <!-- 2. Animated/Blurred Blobs -->
  <circle cx="200" cy="200" r="250" fill="#581c87" filter="url(#blurFilter)" opacity="0.4" style="mix-blend-mode: screen;" />
  <circle cx="700" cy="700" r="300" fill="#1e3a8a" filter="url(#blurFilter)" opacity="0.4" style="mix-blend-mode: screen;" />
  <circle cx="150" cy="650" r="200" fill="#831843" filter="url(#blurFilter)" opacity="0.4" style="mix-blend-mode: screen;" />

  <!-- 3. Grid Overlay -->
  <rect width="800" height="800" fill="url(#grid)" rx="32" />

  <!-- 4. Outer Border -->
  <rect x="2" y="2" width="796" height="796" rx="30" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

  <!-- 5. Profile Image (Center Top) -->
  <g filter="url(#glassShadow)">
    <circle cx="400" cy="280" r="160" fill="#0d1117" />
    <!-- Centered image slice -->
    <image href="https://raw.githubusercontent.com/Shalom-Karr/About/refs/heads/main/img/ShalomProfessional.jpg" x="240" y="120" width="320" height="320" preserveAspectRatio="xMidYMid slice" clip-path="url(#imageMask)" />
    <!-- Gradient Fade over image for consistency -->
    <circle cx="400" cy="280" r="160" fill="url(#bgGradient)" opacity="0.2" />
    <!-- Inner Border Ring -->
    <circle cx="400" cy="280" r="160" fill="none" stroke="#3b82f6" stroke-width="4" opacity="0.8" />
  </g>

  <!-- Decorative Accent Dots (Top Right) -->
  <circle cx="720" cy="80" r="6" fill="#3b82f6" />
  <circle cx="695" cy="80" r="6" fill="#3b82f6" opacity="0.6" />
  <circle cx="670" cy="80" r="6" fill="#3b82f6" opacity="0.3" />

  <!-- 6. Content Section -->
  <g transform="translate(400, 520)" text-anchor="middle">
    
    <!-- Cursive Name -->
    <text x="0" y="0" font-family="'Great Vibes', cursive" font-size="90" fill="#ffffff">
      Shalom Karr
    </text>

    <!-- Title / Subtitle in Inter -->
    <text x="0" y="60" font-family="'Inter', sans-serif" font-size="16" font-weight="800" fill="#3b82f6" letter-spacing="4" text-transform="uppercase">
      WEBSITE DEVELOPMENT &amp; AI ENGINEER
    </text>

    <!-- Horizontal Divider -->
    <line x1="-150" y1="100" x2="150" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  </g>

  <!-- Footer Links / Contact Info -->
  <g transform="translate(400, 660)" font-family="'Inter', sans-serif" font-size="18" font-weight="500" fill="#8b949e" text-anchor="middle">
    
    <!-- Website -->
    <text x="0" y="0"><tspan fill="#3b82f6">🌐</tspan> shalomkarr.pages.dev</text>
    
    <!-- Email -->
    <text x="0" y="40"><tspan fill="#3b82f6">✉️</tspan> shalomkarr@gmail.com</text>
    
    <!-- Phone -->
    <text x="0" y="80"><tspan fill="#3b82f6">📱</tspan> (216) 451-6698</text>

  </g>

  <!-- QR Code (Bottom Left) -->
  <g transform="translate(60, 660) scale(2.5)">
    <rect x="0" y="0" width="37" height="37" rx="2" fill="#ffffff" opacity="0.05" />
    <path fill="none" stroke="#ffffff" stroke-width="1" shape-rendering="crispEdges" opacity="0.8" d="M4 4.5h7m6 0h1m2 0h1m1 0h2m2 0h7M4 5.5h1m5 0h1m1 0h2m1 0h2m1 0h7m1 0h1m5 0h1M4 6.5h1m1 0h3m1 0h1m3 0h1m1 0h3m1 0h1m2 0h1m2 0h1m1 0h3m1 0h1M4 7.5h1m1 0h3m1 0h1m2 0h7m2 0h2m2 0h1m1 0h3m1 0h1M4 8.5h1m1 0h3m1 0h1m1 0h2m1 0h1m2 0h1m4 0h1m2 0h1m1 0h3m1 0h1M4 9.5h1m5 0h1m4 0h3m5 0h2m1 0h1m5 0h1M4 10.5h7m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h7M14 11.5h1m2 0h2m1 0h4M4 12.5h1m1 0h1m1 0h1m1 0h1m2 0h1m4 0h2m1 0h2m1 0h1m3 0h1m2 0h1M5 13.5h5m1 0h2m1 0h2m2 0h2m4 0h3m2 0h1m2 0h1M4 14.5h3m1 0h1m1 0h2m1 0h5m3 0h1m2 0h2m2 0h1m1 0h3M9 15.5h1m2 0h2m5 0h1m1 0h1m1 0h1m2 0h1m1 0h1m2 0h1M5 16.5h1m1 0h5m1 0h2m5 0h2m3 0h2m2 0h1m1 0h2M6 17.5h3m2 0h1m1 0h5m1 0h3m2 0h3m2 0h1m2 0h1M5 18.5h4m1 0h5m1 0h1m1 0h3m3 0h2m1 0h3m1 0h2M9 19.5h1m4 0h2m1 0h2m1 0h2m2 0h1m2 0h1m1 0h1m1 0h1M5 20.5h1m1 0h1m1 0h3m1 0h1m1 0h1m2 0h2m1 0h1m1 0h4m2 0h1m1 0h2M7 21.5h3m1 0h1m3 0h1m2 0h2m1 0h1m3 0h2m2 0h2m1 0h1M4 22.5h1m2 0h6m1 0h1m1 0h2m6 0h1m3 0h1m2 0h2M5 23.5h5m4 0h3m2 0h1m1 0h2m3 0h4m1 0h1M4 24.5h1m1 0h2m1 0h2m2 0h1m2 0h1m3 0h2m2 0h5M12 25.5h1m1 0h1m1 0h2m1 0h4m1 0h1m3 0h1m1 0h3M4 26.5h7m2 0h1m1 0h1m2 0h4m1 0h2m1 0h1m1 0h2m1 0h2M4 27.5h1m5 0h1m3 0h5m1 0h2m2 0h1m3 0h2m1 0h1M4 28.5h1m1 0h3m1 0h1m1 0h3m1 0h1m1 0h2m2 0h1m1 0h5m2 0h1M4 29.5h1m1 0h3m1 0h1m2 0h3m2 0h2m3 0h2m2 0h2m1 0h1M4 30.5h1m1 0h3m1 0h1m1 0h1m1 0h1m1 0h3m2 0h1m2 0h1m2 0h3m2 0h1M4 31.5h1m5 0h1m2 0h2m2 0h1m1 0h1m4 0h2m2 0h1m2 0h1M4 32.5h7m1 0h1m3 0h2m2 0h1m2 0h4m1 0h2m1 0h2"/>
  </g>

</svg>