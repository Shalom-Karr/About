<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- URL Redirect Check -->
  <script>
    // Check if current hostname is netlify.app and redirect to pages.dev
    if (window.location.hostname === 'shalomkarr.netlify.app') {
      window.location.replace(window.location.href.replace('shalomkarr.netlify.app', 'shalomkarr.pages.dev'));
    }
  </script>

  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>

  <style>
    /* Basic overrides for EasyMDE dark mode compatibility */
    .dark .editor-toolbar { background: #374151; border-color: #4B5563; }
    .dark .editor-toolbar button { color: #D1D5DB; }
    .dark .editor-toolbar button:hover, .dark .editor-toolbar button.active { background: #4B5563; border-color: #4B5563; }
    .editor-toolbar.fullscreen { z-index: 10000 !important; } 
    .CodeMirror-fullscreen, .editor-preview-side, .editor-preview { z-index: 9999 !important; }
    .dark .CodeMirror { background: #1F2937; color: #F3F4F6; border-color: #4B5563; }
    .dark .editor-preview, .dark .editor-preview-side { background: #111827; color: #F3F4F6; }
    .dark .editor-statusbar { color: #9CA3AF; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 h-screen overflow-hidden flex flex-col">

  <!-- Hidden file input for image upload -->
  <input type="file" id="hidden-image-upload" accept="image/*" class="hidden" onchange="handleHiddenImageUpload(event)">

  <!-- Top bar -->
  <header class="bg-white dark:bg-gray-800 shadow px-6 py-3 flex justify-between items-center z-10">
    <h1 class="font-bold text-xl">Blog Admin</h1>
    <div id="user-controls" class="hidden flex items-center gap-4">
      <span id="user-mode-label" class="text-sm font-medium"></span>
      <button onclick="logout()" class="px-3 py-1 bg-red-600 hover:bg-red-700 text-white rounded text-sm font-bold transition-colors">Log Out</button>
    </div>
  </header>

  <!-- Login Section -->
  <div id="login-section" class="flex-1 flex items-center justify-center p-4 overflow-y-auto">
    <div class="bg-white dark:bg-gray-800 p-8 rounded-lg shadow-md w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">Log In</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold mb-1">Email</label>
          <input type="email" id="email" class="w-full border dark:border-gray-700 rounded px-3 py-2 bg-transparent focus:ring-2 focus:ring-blue-500 outline-none" placeholder="admin@example.com">
        </div>
        <div>
          <label class="block text-sm font-bold mb-1">Password</label>
          <input type="password" id="password" class="w-full border dark:border-gray-700 rounded px-3 py-2 bg-transparent focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••">
        </div>
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors">Log In securely</button>
        <p id="login-msg" class="text-red-500 text-sm text-center h-4"></p>
        
        <div class="border-t dark:border-gray-700 my-4 pt-4">
          <button onclick="devLogin()" class="w-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 font-bold py-2 px-4 rounded transition-colors">Enter Dev Mode (Mock Login)</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboard-section" class="hidden flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 border-r dark:border-gray-700 bg-white dark:bg-gray-800 flex flex-col h-full shrink-0">
      <div class="p-4 border-b dark:border-gray-700 flex justify-between items-center">
        <h2 class="font-bold text-gray-500 uppercase text-xs tracking-wider">Menu</h2>
        <button onclick="newPost()" class="text-xs bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded" title="New Post">New Post</button>
      </div>
      <div class="p-2 border-b dark:border-gray-700 flex flex-col gap-1">
        <button onclick="switchTab('editor')" id="tab-editor" class="text-left px-3 py-2 bg-blue-50 dark:bg-blue-900 rounded text-sm font-bold text-blue-600 dark:text-blue-300">Editor</button>
        <button onclick="switchTab('inbox')" id="tab-inbox" class="text-left px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded text-sm font-medium">
            Inbox <span id="unread-badge" class="hidden ml-1 px-1.5 py-0.5 bg-red-500 text-white text-xs rounded-full font-bold">0</span>
        </button>
      </div>
      <div id="post-list" class="flex-1 overflow-y-auto">
        <!-- Posts injected here -->
      </div>
    </aside>
    
    <!-- Editor Tab -->
    <main id="editor-view" class="flex-1 overflow-y-auto p-6 lg:p-10 bg-gray-50 dark:bg-gray-900">
      <div class="max-w-4xl mx-auto space-y-6">
        <div class="flex justify-between items-center">
          <h2 id="editor-title" class="text-2xl font-bold">Create New Post</h2>
          <button onclick="submitPost()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded font-bold transition-colors">Save Post</button>
        </div>
        <p id="post-msg" class="text-sm h-4"></p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-bold mb-1">Title</label>
            <input type="text" id="post-title" class="w-full border dark:border-gray-700 rounded px-3 py-2 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="My Awesome Post">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">Slug (URL friendly)</label>
            <input type="text" id="post-slug" class="w-full border dark:border-gray-700 rounded px-3 py-2 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="my-awesome-post">
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold mb-1">Excerpt</label>
          <input type="text" id="post-excerpt" class="w-full border dark:border-gray-700 rounded px-3 py-2 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="A short summary...">
        </div>
        
        <div>
          <label class="block text-sm font-bold mb-1">Tags (comma separated)</label>
          <input type="text" id="post-tags" class="w-full border dark:border-gray-700 rounded px-3 py-2 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="code, life, python">
        </div>

        <div>
          <label class="block text-sm font-bold mb-1">Content (Markdown)</label>
          <textarea id="post-content"></textarea>
        </div>

        <div class="flex items-center gap-2 pb-10">
          <input type="checkbox" id="post-published" class="w-4 h-4">
          <label for="post-published" class="font-bold cursor-pointer">Published</label>
        </div>
      </div>
    </main>

    <!-- Inbox Tab -->
    <main id="inbox-view" class="hidden flex-1 overflow-y-auto p-6 lg:p-10 bg-gray-50 dark:bg-gray-900">
      <div class="max-w-4xl mx-auto space-y-6">
        <!-- Header with actions -->
        <div class="flex justify-between items-center">
          <div>
            <h2 class="text-2xl font-bold">Message Inbox</h2>
            <p id="inbox-count" class="text-sm text-gray-500 mt-1">Loading messages...</p>
          </div>
          <div class="flex gap-2">
            <button onclick="refreshInbox()" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm font-bold transition-colors flex items-center gap-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
              Refresh
            </button>
            <button onclick="markAllRead()" class="px-3 py-2 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded text-sm font-bold transition-colors">
              Mark All Read
            </button>
          </div>
        </div>

        <!-- Filter tabs -->
        <div class="flex gap-2 border-b dark:border-gray-700 pb-3">
          <button onclick="filterInbox('all')" id="filter-all" class="px-3 py-1.5 rounded-lg text-sm font-bold bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300">All</button>
          <button onclick="filterInbox('unread')" id="filter-unread" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800">Unread</button>
          <button onclick="filterInbox('read')" id="filter-read" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800">Read</button>
        </div>

        <!-- Messages list -->
        <div id="inbox-messages" class="space-y-3">
          <!-- Messages dynamically injected here -->
        </div>
      </div>
    </main>

    <!-- Settings Tab -->
    <main id="settings-view" class="hidden flex-1 overflow-y-auto p-6 lg:p-10 bg-gray-50 dark:bg-gray-900">
      <div class="max-w-2xl mx-auto space-y-6">
        <div class="flex justify-between items-center border-b dark:border-gray-700 pb-4">
          <h2 class="text-2xl font-bold">Site Settings</h2>
          <button onclick="saveSettings()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded font-bold transition-colors">Save Settings</button>
        </div>
        <p id="settings-msg" class="text-sm h-4"></p>
        
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-bold mb-1">Display Name</label>
            <input type="text" id="setting-name" class="w-full border dark:border-gray-700 rounded px-3 py-2 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Shalom Karr">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">Avatar URL</label>
            <input type="text" id="setting-avatar" class="w-full border dark:border-gray-700 rounded px-3 py-2 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="https://example.com/avatar.jpg">
          </div>
          <div>
            <label class="block text-sm font-bold mb-1">Bio</label>
            <textarea id="setting-bio" rows="4" class="w-full border dark:border-gray-700 rounded px-3 py-2 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Full-stack developer..."></textarea>
          </div>
        </div>
      </div>
    </main>

  </div>


  
  <script type="module">import { supabase } from "/supabase-client.js"; window.supabaseClient = supabase;</script><script src="/blog/js/app.js"></script>
  <script>
    let isDevMode = false;
    let currentPostId = null;
    let easyMDE = null;
    let allPosts = [];
    let mockSettings = { name: "Shalom Karr", bio: "Full-stack developer building cool things on the internet.", avatar_url: "https://shalomkarr.pages.dev/img/ShalomProfessional.jpg" };

    document.addEventListener("DOMContentLoaded", async () => {
      // Initialize EasyMDE
      easyMDE = new EasyMDE({
        element: document.getElementById('post-content'),
        spellChecker: false,
        status: false,
        minHeight: "400px",
        previewClass: ["editor-preview", "prose", "prose-blue", "dark:prose-invert", "max-w-none"],
        toolbar: [
          "bold", "italic", "heading", "|", "quote", "unordered-list", "ordered-list", "|", "link",
          {
            name: "image",
            action: function customImageAction(editor){
               triggerImageUpload();
            },
            className: "fa fa-picture-o",
            title: "Upload Image (Ctrl-Alt-I)",
          },
          "|", "preview", "side-by-side", "fullscreen", "|", "guide"
        ]
      });

      // Handle image paste
      easyMDE.codemirror.on('paste', async (cm, event) => {
        const items = (event.clipboardData || event.originalEvent.clipboardData).items;
        for (const item of items) {
          if (item.type.indexOf('image') === 0) {
            event.preventDefault();
            const file = item.getAsFile();
            await uploadAndInsertImage(file);
            break;
          }
        }
      });

      // Handle Ctrl-Alt-I shortcut
      easyMDE.codemirror.addKeyMap({
        "Ctrl-Alt-I": function(cm) {
          triggerImageUpload();
        }
      });

      // Check auth session
      if (window.supabaseClient) {
        const { data: { session } } = await window.supabaseClient.auth.getSession();
        if (session) {
          showDashboard(false);
        }
      }
    });

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('login-msg');
      msg.innerText = "Logging in...";
      
      const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        msg.innerText = error.message;
      } else {
        msg.innerText = "";
        showDashboard(false);
      }
    }

    function devLogin() {
      isDevMode = true;
      showDashboard(true);
    }

    function triggerImageUpload() {
      document.getElementById('hidden-image-upload').click();
    }

    async function handleHiddenImageUpload(event) {
      const file = event.target.files[0];
      if (file) {
        await uploadAndInsertImage(file);
      }
      event.target.value = ''; // Reset input
    }

    async function uploadAndInsertImage(file) {
      const msg = document.getElementById('post-msg');
      msg.innerText = "Uploading image...";
      msg.className = "text-sm h-4 text-blue-600";
      
      const fileExt = file.name ? file.name.split('.').pop() : 'png';
      const fileName = `${Date.now()}-${Math.random().toString(36).substring(2, 15)}.${fileExt}`;
      
      if (isDevMode) {
         setTimeout(() => {
             const mockUrl = "https://via.placeholder.com/800x400.png?text=Mock+Image";
             insertImageMarkdown(mockUrl, fileName);
             msg.innerText = "Mock image uploaded.";
             msg.className = "text-sm h-4 text-green-600";
             setTimeout(() => msg.innerText = '', 3000);
         }, 1000);
         return;
      }

      const { data, error } = await window.supabaseClient.storage
        .from('blog-images')
        .upload(fileName, file, { cacheControl: '3600', upsert: false });
        
      if (error) {
        msg.innerText = "Upload failed: " + error.message;
        msg.className = "text-sm h-4 text-red-600";
      } else {
        const { data: { publicUrl } } = window.supabaseClient.storage.from('blog-images').getPublicUrl(fileName);
        insertImageMarkdown(publicUrl, fileName);
        msg.innerText = "Image uploaded!";
        msg.className = "text-sm h-4 text-green-600";
        setTimeout(() => msg.innerText = '', 3000);
      }
    }

    function insertImageMarkdown(url, altText) {
      const cm = easyMDE.codemirror;
      const pos = cm.getCursor();
      cm.replaceRange(`![${altText}](${url})\n`, pos);
    }

    async function logout() {
      if (!isDevMode) await window.supabaseClient.auth.signOut();
      isDevMode = false;
      document.getElementById('dashboard-section').classList.add('hidden');
      document.getElementById('dashboard-section').classList.remove('flex');
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('user-controls').classList.add('hidden');
    }

    async function showDashboard(devMode = false) {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('dashboard-section').classList.remove('hidden');
      document.getElementById('dashboard-section').classList.add('flex');
      
      const controls = document.getElementById('user-controls');
      controls.classList.remove('hidden');
      document.getElementById('user-mode-label').innerText = devMode ? 'DEV MODE' : 'Admin';
      
      await loadPosts();
      await loadInbox();
      await fetchSettings();
    }

    function switchTab(tab) {
      document.getElementById('editor-view').classList.toggle('hidden', tab !== 'editor');
      document.getElementById('inbox-view').classList.toggle('hidden', tab !== 'inbox');
      document.getElementById('settings-view').classList.toggle('hidden', tab !== 'settings');

      const tabs = ['editor', 'inbox'];
      tabs.forEach(t => {
        const el = document.getElementById('tab-' + t);
        if (!el) return;
        if (t === tab) {
          el.className = "text-left px-3 py-2 bg-blue-50 dark:bg-blue-900 rounded text-sm font-bold text-blue-600 dark:text-blue-300";
        } else {
          el.className = "text-left px-3 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded text-sm font-medium";
        }
      });

      if (tab === 'inbox') {
        loadInbox();
      }
    }

    async function loadPosts() {
      if (isDevMode) {
        allPosts = [
          { id: 'dev-1', title: 'Test Post 1', slug: 'test-1', excerpt: 'Excerpt', content_md: '# Hello\\n\\nThis is a mock post.', is_published: true, tags: ['test'] },
          { id: 'dev-2', title: 'Draft Post', slug: 'draft', excerpt: 'Draft', content_md: 'Drafting...', is_published: false, tags: [] }
        ];
        renderPostList();
        return;
      }

      const { data, error } = await window.supabaseClient
        .from('posts')
        .select('*')
        .order('created_at', { ascending: false });

      if (data) {
        allPosts = data;
        renderPostList();
      } else if (error) {
        console.error("Error loading posts:", error);
      }
    }

    function renderPostList() {
      const list = document.getElementById('post-list');
      list.innerHTML = '';
      allPosts.forEach((p, index) => {
        const div = document.createElement('div');
        div.className = `p-4 border-b dark:border-gray-700 cursor-pointer transition-colors ${currentPostId === p.id ? 'bg-blue-50 dark:bg-blue-900' : 'hover:bg-gray-100 dark:hover:bg-gray-700'}`;
        div.innerHTML = `
          <h3 class="font-bold text-sm truncate">${p.title}</h3>
          <p class="text-xs text-gray-500 mt-1">${p.is_published ? '<span class="text-green-600 dark:text-green-400">Published</span>' : '<span class="text-yellow-600 dark:text-yellow-400">Draft</span>'}</p>
        `;
        div.onclick = () => { editPost(index); switchTab('editor'); };
        list.appendChild(div);
      });
    }

    function newPost() {
      currentPostId = null;
      document.getElementById('editor-title').innerText = "Create New Post";
      document.getElementById('post-title').value = '';
      document.getElementById('post-slug').value = '';
      document.getElementById('post-excerpt').value = '';
      document.getElementById('post-tags').value = '';
      easyMDE.value('');
      document.getElementById('post-published').checked = false;
      document.getElementById('post-msg').innerText = '';
      renderPostList(); // Clear active state
      switchTab('editor');
    }

    function editPost(index) {
      const post = allPosts[index];
      currentPostId = post.id;
      document.getElementById('editor-title').innerText = "Edit Post";
      document.getElementById('post-title').value = post.title;
      document.getElementById('post-slug').value = post.slug;
      document.getElementById('post-excerpt').value = post.excerpt || '';
      document.getElementById('post-tags').value = (post.tags || []).join(', ');
      easyMDE.value(post.content_md);
      document.getElementById('post-published').checked = post.is_published;
      document.getElementById('post-msg').innerText = '';
      renderPostList(); // Update active state
    }

    function showMsg(id, text, type = 'success') {
      const msg = document.getElementById(id);
      msg.innerText = text;
      msg.className = `text-sm h-4 ${type === 'error' ? 'text-red-600' : 'text-green-600'}`;
      setTimeout(() => msg.innerText = '', 3000);
    }

    async function submitPost() {
      const title = document.getElementById('post-title').value.trim();
      const slug = document.getElementById('post-slug').value.trim();
      const excerpt = document.getElementById('post-excerpt').value.trim();
      const tagsRaw = document.getElementById('post-tags').value;
      const content_md = easyMDE.value().trim();
      const is_published = document.getElementById('post-published').checked;

      if (!title || !slug || !content_md) {
        showMsg("post-msg", "Title, Slug, and Content are required.", "error");
        return;
      }

      const tagsArray = tagsRaw.split(',').map(t => t.trim()).filter(t => t.length > 0);
      const postData = { title, slug, excerpt, content_md, tags: tagsArray, is_published };

      if (isDevMode) {
        if (currentPostId) {
          const idx = allPosts.findIndex(p => p.id === currentPostId);
          allPosts[idx] = { ...allPosts[idx], ...postData };
        } else {
          const newMock = { id: 'dev-' + Date.now(), ...postData };
          allPosts.unshift(newMock);
          currentPostId = newMock.id;
        }
        renderPostList();
        showMsg("post-msg", "Saved locally in Dev Mode!");
        return;
      }

      let error;
      if (currentPostId) {
        const res = await window.supabaseClient.from('posts').update(postData).eq('id', currentPostId);
        error = res.error;
      } else {
        const res = await window.supabaseClient.from('posts').insert([postData]).select();
        error = res.error;
        if (res.data && res.data.length > 0) {
          currentPostId = res.data[0].id;
        }
      }

      if (error) {
        showMsg("post-msg", "Error: " + error.message, "error");
      } else {
        showMsg("post-msg", "Post saved successfully!");
        document.getElementById('editor-title').innerText = "Edit Post";
        await loadPosts();
      }
    }

    async function fetchSettings() {
      if (isDevMode) {
        document.getElementById('setting-name').value = mockSettings.name;
        document.getElementById('setting-bio').value = mockSettings.bio;
        document.getElementById('setting-avatar').value = mockSettings.avatar_url;
        return;
      }
      const { data, error } = await window.supabaseClient.from('sitesettings').select('*').eq('id', 1).single();
      if (data) {
        document.getElementById('setting-name').value = data.name;
        document.getElementById('setting-bio').value = data.bio;
        document.getElementById('setting-avatar').value = data.avatar_url || '';
      }
    }

    async function saveSettings() {
      const name = document.getElementById('setting-name').value.trim();
      const bio = document.getElementById('setting-bio').value.trim();
      const avatar_url = document.getElementById('setting-avatar').value.trim();

      if (isDevMode) {
        mockSettings = { name, bio, avatar_url };
        showMsg("settings-msg", "Settings updated locally!");
        return;
      }

      const { error } = await window.supabaseClient.from('sitesettings').upsert({ id: 1, name, bio, avatar_url });
      if (error) {
        showMsg("settings-msg", "Error: " + error.message, "error");
      } else {
        showMsg("settings-msg", "Settings saved successfully!");
      }
    }

    // --- Inbox ---
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    let allMessages = [];
    let currentFilter = 'all';

    async function loadInbox() {
      if (isDevMode) {
        allMessages = [
          { id: 'msg-1', name: 'Jane Smith', email: 'jane@example.com', subject: 'Collaboration Opportunity', message: 'Hi Shalom! I came across your portfolio and I am really impressed with your work. I would love to discuss a potential collaboration on a web application project. Would you be available for a call next week?', created_at: new Date(Date.now() - 1000 * 60 * 30).toISOString(), is_read: false },
          { id: 'msg-2', name: 'Tech Corp HR', email: 'hr@techcorp.com', subject: 'Full-Stack Developer Position', message: 'We have an exciting opportunity for a Full-Stack Developer role that matches your skill set. The position involves JavaScript, Node.js, and PostgreSQL — right up your alley! Please let us know if you are interested.', created_at: new Date(Date.now() - 1000 * 60 * 60 * 3).toISOString(), is_read: false },
          { id: 'msg-3', name: 'Alex Johnson', email: 'alex@startup.io', subject: 'Bug Report on Your Portfolio', message: 'Hey, just wanted to let you know there is a minor visual glitch on mobile when scrolling through the skills section. Great site otherwise!', created_at: new Date(Date.now() - 1000 * 60 * 60 * 24 * 2).toISOString(), is_read: true },
        ];
        updateUnreadBadge();
        renderInbox();
        return;
      }

      const { data, error } = await window.supabaseClient
        .from('contact_messages')
        .select('*')
        .order('created_at', { ascending: false });

      if (data) {
        allMessages = data;
        updateUnreadBadge();
        renderInbox();
      } else if (error) {
        console.error('Error loading messages:', error);
        document.getElementById('inbox-count').innerText = 'Error loading messages.';
      }
    }

    function renderInbox() {
      const container = document.getElementById('inbox-messages');
      const countEl = document.getElementById('inbox-count');

      let filtered = allMessages;
      if (currentFilter === 'unread') filtered = allMessages.filter(m => !m.is_read);
      if (currentFilter === 'read') filtered = allMessages.filter(m => m.is_read);

      const unreadCount = allMessages.filter(m => !m.is_read).length;
      countEl.innerText = `${allMessages.length} message${allMessages.length !== 1 ? 's' : ''} (${unreadCount} unread)`;

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="text-center py-16">
            <svg class="w-16 h-16 mx-auto text-gray-300 dark:text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
            <h3 class="font-bold text-lg text-gray-400">No messages yet</h3>
            <p class="text-sm text-gray-500 mt-1">Messages from your contact form will appear here.</p>
          </div>`;
        return;
      }

      container.innerHTML = filtered.map(msg => {
        const isRead = msg.is_read;
        // Sanitize id to only allow safe UUID characters
        const safeId = String(msg.id).replace(/[^a-zA-Z0-9\-_]/g, '');
        const escapedName = escapeHtml(msg.name);
        const escapedEmail = escapeHtml(msg.email);
        const escapedMessage = escapeHtml(msg.message);
        const escapedSubject = escapeHtml(msg.subject || '');
        const mailtoSubject = encodeURIComponent('Re: ' + (msg.subject || ''));
        const preview = escapedMessage.substring(0, 100) + (msg.message.length > 100 ? '...' : '');
        return `
          <div class="message-card p-5 rounded-xl border transition-all duration-200 cursor-pointer hover:shadow-md ${isRead ? 'bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700' : 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800 shadow-sm'}" onclick="toggleMessage('${safeId}')">
            <div class="flex justify-between items-start mb-2">
              <div class="flex items-center gap-3">
                ${!isRead ? '<div class="w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse flex-shrink-0"></div>' : ''}
                <div>
                  <h3 class="font-bold text-sm">${escapedName}</h3>
                  <a href="mailto:${escapedEmail}" class="text-xs text-blue-500 hover:underline">${escapedEmail}</a>
                </div>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400">${timeAgo(msg.created_at)}</span>
                <button onclick="event.stopPropagation(); deleteMessage('${safeId}')" class="p-1 hover:bg-red-100 dark:hover:bg-red-900/30 rounded text-gray-400 hover:text-red-500 transition-colors" title="Delete">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
              </div>
            </div>
            <p class="font-semibold text-sm mb-1 ${!isRead ? 'text-gray-900 dark:text-white' : 'text-gray-700 dark:text-gray-300'}">${escapedSubject || '(No Subject)'}</p>
            <div id="msg-body-${safeId}" class="hidden mt-3 pt-3 border-t dark:border-gray-700">
              <p class="text-sm text-gray-600 dark:text-gray-300 whitespace-pre-wrap leading-relaxed">${escapedMessage}</p>
              <div class="flex gap-2 mt-4">
                <a href="mailto:${escapedEmail}?subject=${mailtoSubject}" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs rounded font-bold transition-colors">Reply via Email</a>
                <button onclick="event.stopPropagation(); toggleReadStatus('${safeId}')" class="px-3 py-1.5 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-xs rounded font-bold transition-colors">
                  ${isRead ? 'Mark Unread' : 'Mark Read'}
                </button>
              </div>
            </div>
            <p id="msg-preview-${safeId}" class="text-xs text-gray-500 truncate">${preview}</p>
          </div>`;
      }).join('');
    }

    function toggleMessage(id) {
      const body = document.getElementById('msg-body-' + id);
      const preview = document.getElementById('msg-preview-' + id);
      if (!body) return;
      const isExpanding = body.classList.contains('hidden');
      body.classList.toggle('hidden', !isExpanding);
      if (preview) preview.classList.toggle('hidden', isExpanding);
      if (isExpanding) {
        markAsRead(id);
      }
    }

    async function markAsRead(id) {
      const msg = allMessages.find(m => String(m.id) === String(id));
      if (!msg || msg.is_read) return;

      // Optimistic update without triggering a full re-render that would collapse the accordion
      msg.is_read = true;
      updateUnreadBadge();

      if (!isDevMode) {
        const { error } = await window.supabaseClient
          .from('contact_messages')
          .update({ is_read: true })
          .eq('id', id);

        if (error) {
          console.error('Error marking message as read:', error);
          msg.is_read = false;
          updateUnreadBadge();
        }
      }
    }

    async function toggleReadStatus(id) {
      const msg = allMessages.find(m => String(m.id) === String(id));
      if (!msg) return;
      
      const previousState = msg.is_read;
      msg.is_read = !msg.is_read;
      
      updateUnreadBadge();
      
      // Stop the click from opening/closing the accordion
      if (event) event.stopPropagation();
      
      // Full re-render is fine here because this is the external toggle button
      renderInbox();

      if (!isDevMode) {
        const { error } = await window.supabaseClient
          .from('contact_messages')
          .update({ is_read: msg.is_read })
          .eq('id', id);

        if (error) {
          console.error('Error toggling read status:', error);
          msg.is_read = previousState;
          updateUnreadBadge();
          renderInbox();
        }
      }
    }

    async function markAllRead() {
      const unread = allMessages.filter(m => !m.is_read);
      if (unread.length === 0) return;

      // Store previous states for rollback
      const previousStates = unread.map(m => ({ id: m.id, was_read: m.is_read }));

      unread.forEach(m => { m.is_read = true; });
      updateUnreadBadge();
      renderInbox();

      if (!isDevMode) {
        const ids = unread.map(m => m.id);
        const { error } = await window.supabaseClient
          .from('contact_messages')
          .update({ is_read: true })
          .in('id', ids);

        if (error) {
          console.error('Error marking all as read:', error);
          // Revert local state on error
          previousStates.forEach(({ id, was_read }) => {
            const msg = allMessages.find(m => m.id === id);
            if (msg) msg.is_read = was_read;
          });
          updateUnreadBadge();
          renderInbox();
        }
      }
    }

    async function deleteMessage(id) {
      if (!confirm('Delete this message? This cannot be undone.')) return;

      // Store the message for rollback
      const deletedMsg = allMessages.find(m => String(m.id) === String(id));
      if (!deletedMsg) return;

      allMessages = allMessages.filter(m => String(m.id) !== String(id));
      updateUnreadBadge();
      renderInbox();

      if (!isDevMode) {
        const { error } = await window.supabaseClient
          .from('contact_messages')
          .delete()
          .eq('id', id);

        if (error) {
          console.error('Error deleting message:', error);
          // Restore message on error
          allMessages.push(deletedMsg);
          allMessages.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
          updateUnreadBadge();
          renderInbox();
        }
      }
    }

    function filterInbox(filter) {
      currentFilter = filter;
      ['all', 'unread', 'read'].forEach(f => {
        const btn = document.getElementById('filter-' + f);
        if (!btn) return;
        if (f === filter) {
          btn.className = "px-3 py-1.5 rounded-lg text-sm font-bold bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300";
        } else {
          btn.className = "px-3 py-1.5 rounded-lg text-sm font-medium text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800";
        }
      });
      renderInbox();
    }

    async function refreshInbox() {
      const countEl = document.getElementById('inbox-count');
      if (countEl) countEl.innerText = 'Refreshing...';
      await loadInbox();
    }

    function timeAgo(dateStr) {
      const now = Date.now();
      const then = new Date(dateStr).getTime();
      const diff = Math.floor((now - then) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 86400 * 30) return Math.floor(diff / 86400) + 'd ago';
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function updateUnreadBadge() {
      const badge = document.getElementById('unread-badge');
      if (!badge) return;
      const count = allMessages.filter(m => !m.is_read).length;
      if (count > 0) {
        badge.innerText = count;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
