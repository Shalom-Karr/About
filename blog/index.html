  <script type="module">import { supabase } from "/supabase-client.js"; window.supabaseClient = supabase;</script><script src="/blog/js/app.js"></script>
  <script>
    let allPosts = [];
    let likeCountsByPost = {};
    let viewCountsByPost = {};
    let currentSort = 'recent';

    document.addEventListener("DOMContentLoaded", async () => {
      const container = document.getElementById('posts-container');
      const searchInput = document.getElementById('search-input');
      const mobileSearchInput = document.getElementById('mobile-search');
      const tagCloudContainer = document.getElementById('tag-cloud');
      const mobileTagCloud = document.getElementById('mobile-tag-cloud');
      const headerBlock = document.getElementById('blog-header');
      const mobileFilterToggle = document.getElementById('mobile-filter-toggle');
      const mobileFiltersPanel = document.getElementById('mobile-filters-panel');
      const sortFilter = document.getElementById('sort-filter');
      const mobileSortFilter = document.getElementById('mobile-sort-filter');

      // Mobile filter toggle
      if (mobileFilterToggle && mobileFiltersPanel) {
        mobileFilterToggle.addEventListener('click', () => {
          mobileFiltersPanel.classList.toggle('hidden');
        });
      }

      if (!window.supabaseClient) {
          container.innerHTML = '<div class="p-6 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-2xl border border-red-200 dark:border-red-800"><b>Supabase Configuration Error:</b> The environment variables SUPABASE_URL and SUPABASE_ANON_KEY are missing. Please set them in your Cloudflare Pages dashboard and trigger a new build.</div>';
          return;
      }

      try {
        const { data: posts, error } = await window.supabaseClient
          .from('posts')
          .select('*')
          .eq('is_published', true)
          .order('created_at', { ascending: false });

        if (error) throw error;
        allPosts = posts || [];

        // Fetch like counts for all posts
        if (allPosts.length > 0) {
          const postIds = allPosts.map(p => p.id);
          const { data: likeCounts } = await window.supabaseClient
            .from('post_likes')
            .select('post_id')
            .in('post_id', postIds);
          if (likeCounts) {
            likeCounts.forEach(row => {
              likeCountsByPost[row.post_id] = (likeCountsByPost[row.post_id] || 0) + 1;
            });
          }

          // Fetch view counts from blog_post_analytics view
          const { data: analytics } = await window.supabaseClient
            .from('blog_post_analytics')
            .select('id, total_views')
            .in('id', postIds);
          if (analytics) {
            analytics.forEach(row => {
              viewCountsByPost[row.id] = row.total_views || 0;
            });
          }
        }

        // Build Tag Cloud
        const tagCounts = {};
        allPosts.forEach(p => {
            if(p.tags) p.tags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; });
        });

        const sortedTags = Object.keys(tagCounts).sort((a,b) => tagCounts[b] - tagCounts[a]);
        const tagCloudHtml = sortedTags.map(t => 
            `<a href="?tag=${encodeURIComponent(t)}" class="text-xs font-semibold bg-gray-200 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 px-3 py-1.5 rounded-full hover:bg-purple-500 hover:border-purple-400 hover:text-white dark:hover:bg-purple-500 dark:hover:border-purple-400 dark:hover:text-white transition-all transform hover:scale-105 inline-flex items-center gap-2">${t} <span class="opacity-50 text-[10px]">${tagCounts[t]}</span></a>`
        ).join('');

        if(tagCloudContainer) tagCloudContainer.innerHTML = tagCloudHtml;
        if(mobileTagCloud) mobileTagCloud.innerHTML = tagCloudHtml;

        // Build Date Archives
        const dateFilter = document.getElementById('date-filter');
        const mobileDateFilter = document.getElementById('mobile-date-filter');
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const uniqueMonths = new Set();
        allPosts.forEach(p => {
            const d = new Date(p.created_at);
            uniqueMonths.add(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
        });

        const sortedMonths = Array.from(uniqueMonths).sort().reverse();

        const populateDateFilter = (filterEl) => {
          if (!filterEl) return;
          sortedMonths.forEach(m => {
            const [year, month] = m.split('-');
            const option = document.createElement('option');
            option.value = m;
            option.textContent = `${monthNames[parseInt(month)-1]} ${year}`;
            filterEl.appendChild(option);
          });
          const activeDate = new URLSearchParams(window.location.search).get('date');
          if (activeDate) filterEl.value = activeDate;
          filterEl.addEventListener('change', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (filterEl.value) {
              urlParams.set('date', filterEl.value);
            } else {
              urlParams.delete('date');
            }
            // Sync the other date filter
            if (filterEl === dateFilter && mobileDateFilter) mobileDateFilter.value = filterEl.value;
            if (filterEl === mobileDateFilter && dateFilter) dateFilter.value = filterEl.value;
            window.history.replaceState({}, '', `${window.location.pathname}?${urlParams}`);
            applyFilters();
          });
        };

        populateDateFilter(dateFilter);
        populateDateFilter(mobileDateFilter);

        // Sort filter event listeners
        if (sortFilter) {
          const urlParams = new URLSearchParams(window.location.search);
          const sortParam = urlParams.get('sort');
          if (sortParam && (sortParam === 'recent' || sortParam === 'liked')) {
            sortFilter.value = sortParam;
            currentSort = sortParam;
          }
          sortFilter.addEventListener('change', () => {
            currentSort = sortFilter.value;
            const urlParams = new URLSearchParams(window.location.search);
            if (currentSort && currentSort !== 'recent') {
              urlParams.set('sort', currentSort);
            } else {
              urlParams.delete('sort');
            }
            // Sync the mobile sort filter
            if (mobileSortFilter) mobileSortFilter.value = currentSort;
            window.history.replaceState({}, '', `${window.location.pathname}?${urlParams}`);
            applyFilters();
          });
        }

        if (mobileSortFilter) {
          const urlParams = new URLSearchParams(window.location.search);
          const sortParam = urlParams.get('sort');
          if (sortParam && (sortParam === 'recent' || sortParam === 'liked')) {
            mobileSortFilter.value = sortParam;
            currentSort = sortParam;
          }
          mobileSortFilter.addEventListener('change', () => {
            currentSort = mobileSortFilter.value;
            const urlParams = new URLSearchParams(window.location.search);
            if (currentSort && currentSort !== 'recent') {
              urlParams.set('sort', currentSort);
            } else {
              urlParams.delete('sort');
            }
            // Sync the desktop sort filter
            if (sortFilter) sortFilter.value = currentSort;
            window.history.replaceState({}, '', `${window.location.pathname}?${urlParams}`);
            applyFilters();
          });
        }

        // Apply filters based on search input and URL query params
        function applyFilters() {
           const urlParams = new URLSearchParams(window.location.search);
           const activeTag = urlParams.get('tag');
           const activeDate = urlParams.get('date');
           const desktopQuery = searchInput ? searchInput.value.toLowerCase() : '';
           const mobileQuery = mobileSearchInput ? mobileSearchInput.value.toLowerCase() : '';
           const query = desktopQuery || mobileQuery;

           let filtered = allPosts;

           if (activeTag) {
               filtered = filtered.filter(p => p.tags && p.tags.includes(activeTag));
               if(headerBlock) {
                 headerBlock.innerHTML = `
                   <h1 class="text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">#${activeTag}</h1>
                   <p class="mt-2 text-gray-500 dark:text-gray-400 font-medium">Showing articles tagged with "${activeTag}". <a href="/blog/" class="text-purple-500 hover:underline ml-2 font-bold">Clear filter &times;</a></p>
                 `;
               }
           } else if (headerBlock) {
               headerBlock.innerHTML = `
                 <h1 class="text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600 dark:from-blue-400 dark:to-purple-400">Writing</h1>
                 <p class="mt-2 text-gray-500 dark:text-gray-400 font-medium">Thoughts, tutorials, and deep dives.</p>
               `;
           }

           if (activeDate) {
               filtered = filtered.filter(p => p.created_at.startsWith(activeDate));
           }

           if (query) {
               filtered = filtered.filter(p =>
                   p.title.toLowerCase().includes(query) ||
                   (p.excerpt && p.excerpt.toLowerCase().includes(query)) ||
                   (p.content_md && p.content_md.toLowerCase().includes(query))
               );
           }

           // Apply sorting
           if (currentSort === 'liked') {
               filtered.sort((a, b) => {
                   const aLikes = likeCountsByPost[a.id] || 0;
                   const bLikes = likeCountsByPost[b.id] || 0;
                   return bLikes - aLikes;
               });
           } else {
               // Sort by most recent (created_at desc)
               filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
           }

           renderPosts(filtered);
        }

        function renderPosts(filteredPosts) {
          if (filteredPosts.length === 0) {
            container.innerHTML = `
              <div class="reveal animate-fade-in-up mt-12 mb-16 relative w-full rounded-3xl overflow-hidden bg-white/40 dark:bg-gray-900/40 border border-gray-200/60 dark:border-gray-800/60 shadow-xl backdrop-blur-md flex flex-col items-center justify-center p-12 text-center group">
                <div class="absolute inset-0 pattern-dots opacity-20 pointer-events-none"></div>
                <h2 class="text-3xl font-extrabold tracking-tight mb-3 text-gray-900 dark:text-white z-10">Nothing found!</h2>
                <p class="text-gray-500 dark:text-gray-400 max-w-sm mb-8 z-10 font-medium">We couldn't find any articles matching your search criteria.</p>
                <a href="/blog/" class="z-10 relative inline-flex items-center justify-center px-6 py-3 font-bold text-white transition-all duration-200 bg-purple-600 rounded-xl hover:bg-purple-500 hover:-translate-y-1 hover:shadow-lg">
                  Clear Filters
                </a>
              </div>
            `;
            return;
          }

          container.innerHTML = filteredPosts.map(post => {
            const tagsHtml = post.tags && post.tags.length > 0 
              ? post.tags.map(t => `<a href="?tag=${encodeURIComponent(t)}" class="bg-blue-50 text-blue-600 border border-blue-100 dark:bg-blue-900/30 dark:text-blue-300 dark:border-blue-800/50 text-xs font-semibold px-2 py-0.5 rounded-full hover:bg-purple-100 hover:text-purple-600 hover:border-purple-300 dark:hover:bg-purple-900/50 dark:hover:text-purple-300 dark:hover:border-purple-700 transition-colors z-20 relative cursor-pointer">${t}</a>`).join(' ')
              : '';

            const wordCount = (post.content_md || '').split(/\s+/).length;
            const readingTime = Math.max(1, Math.ceil(wordCount / 200));
            const likeCount = likeCountsByPost[post.id] || 0;
            const viewCount = viewCountsByPost[post.id] || 0;

            return `
            <article class="post-card reveal bg-white/60 dark:bg-gray-800/60 backdrop-blur-sm border border-gray-200 dark:border-gray-700/80 rounded-2xl p-6 relative overflow-hidden group">
              <a href="/blog/post/${post.slug}" class="absolute inset-0 z-10"></a>

              <div class="flex flex-wrap items-center gap-3 text-xs text-gray-500 dark:text-gray-400 font-medium mb-3">
                <time datetime="${post.created_at}">${new Date(post.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</time>
                <span class="flex items-center gap-1">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                  </svg>
                  ${readingTime} min read
                </span>
                <span class="flex items-center gap-1 text-blue-500">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                  </svg>
                  ${viewCount}
                </span>
                <span class="flex items-center gap-1 text-pink-500">
                  <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                  </svg>
                  ${likeCount}
                </span>
                ${tagsHtml ? `<div class="flex gap-1.5 z-20 relative">${tagsHtml}</div>` : ''}
              </div>

              <h2 class="text-2xl font-bold tracking-tight mb-3 text-gray-900 dark:text-gray-100 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                ${post.title}
              </h2>

              <p class="text-gray-600 dark:text-gray-300 leading-relaxed mb-4 line-clamp-2">
                ${post.excerpt || "Click to read the full article..."}
              </p>

              <div class="inline-flex items-center text-sm font-bold text-blue-600 dark:text-blue-400 group-hover:translate-x-1 transition-transform">
                Read article <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
              </div>
            </article>
          `}).join('');

          if (window.initScrollAnimations) window.initScrollAnimations();
        }

        if (searchInput) {
            searchInput.addEventListener('input', applyFilters);
        }
        if (mobileSearchInput) {
            mobileSearchInput.addEventListener('input', applyFilters);
        }

        applyFilters();

        // ===== Developer-friendly keyboard navigation =====
        let kbIndex = -1;
        const cards = () => Array.from(container.querySelectorAll('.post-card'));

        const focusCard = (i) => {
          const list = cards();
          if (!list.length) return;
          kbIndex = Math.max(0, Math.min(list.length - 1, i));
          list.forEach(c => c.classList.remove('kb-focus'));
          const el = list[kbIndex];
          el.classList.add('kb-focus');
          el.scrollIntoView({ block: 'center', behavior: 'smooth' });
        };

        // Reset keyboard focus when filters re-render the grid
        const observer = new MutationObserver(() => { kbIndex = -1; });
        observer.observe(container, { childList: true });

        let chord = '';
        let chordTimer = null;
        const armChord = () => { clearTimeout(chordTimer); chordTimer = setTimeout(() => chord = '', 1200); };

        document.addEventListener('keydown', (e) => {
          const tag = (e.target && e.target.tagName) || '';
          const editable = /^(INPUT|TEXTAREA|SELECT)$/.test(tag) || (e.target && e.target.isContentEditable);

          // `/` focuses search even when not editable
          if (e.key === '/' && !e.metaKey && !e.ctrlKey && !editable) {
            e.preventDefault();
            (searchInput || mobileSearchInput)?.focus();
            return;
          }
          if (e.key === 'Escape' && editable) {
            e.target.blur();
            return;
          }
          if (editable) return;

          // `?` opens a mini shortcuts popup (alert fallback)
          if (e.key === '?' || (e.shiftKey && e.key === '/')) {
            e.preventDefault();
            showBlogHelp();
            return;
          }

          // j / k post navigation
          if (e.key === 'j') { e.preventDefault(); focusCard(kbIndex + 1); return; }
          if (e.key === 'k') { e.preventDefault(); focusCard(kbIndex - 1); return; }
          if (e.key === 'Enter' && kbIndex >= 0) {
            const list = cards();
            const link = list[kbIndex]?.querySelector('a');
            if (link) { e.preventDefault(); link.click(); }
            return;
          }
          if (e.key === 'g' && !chord) { chord = 'g'; armChord(); return; }
          if (chord === 'g') {
            if (e.key === 'h') { e.preventDefault(); location.href = '/'; }
            else if (e.key === 'c') { e.preventDefault(); location.href = '/blog/contact/'; }
            else if (e.key === 'a') { e.preventDefault(); location.href = '/blog/about/'; }
            else if (e.key === 'g') { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
            chord = '';
          }
        });

        function showBlogHelp() {
          if (document.getElementById('blog-help-modal')) return;
          const m = document.createElement('div');
          m.id = 'blog-help-modal';
          m.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(3,7,18,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px';
          m.innerHTML = `
            <div style="background:#111827;border:1px solid rgba(139,92,246,.35);border-radius:12px;padding:28px;max-width:440px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.6);color:#e5e7eb;font-family:ui-monospace,monospace">
              <h3 style="font-size:16px;font-weight:700;color:#fff;margin-bottom:18px">Blog shortcuts</h3>
              <table style="width:100%;font-size:13px;line-height:2">
                <tr><td>Focus search</td><td style="text-align:right"><kbd style="padding:2px 8px;background:#1f2937;border:1px solid #374151;border-radius:4px">/</kbd></td></tr>
                <tr><td>Next / prev post</td><td style="text-align:right"><kbd style="padding:2px 8px;background:#1f2937;border:1px solid #374151;border-radius:4px">j</kbd> <kbd style="padding:2px 8px;background:#1f2937;border:1px solid #374151;border-radius:4px">k</kbd></td></tr>
                <tr><td>Open focused post</td><td style="text-align:right"><kbd style="padding:2px 8px;background:#1f2937;border:1px solid #374151;border-radius:4px">↵</kbd></td></tr>
                <tr><td>Go home</td><td style="text-align:right"><kbd style="padding:2px 8px;background:#1f2937;border:1px solid #374151;border-radius:4px">g</kbd> <kbd style="padding:2px 8px;background:#1f2937;border:1px solid #374151;border-radius:4px">h</kbd></td></tr>
                <tr><td>Go to contact</td><td style="text-align:right"><kbd style="padding:2px 8px;background:#1f2937;border:1px solid #374151;border-radius:4px">g</kbd> <kbd style="padding:2px 8px;background:#1f2937;border:1px solid #374151;border-radius:4px">c</kbd></td></tr>
                <tr><td>Scroll top</td><td style="text-align:right"><kbd style="padding:2px 8px;background:#1f2937;border:1px solid #374151;border-radius:4px">g</kbd> <kbd style="padding:2px 8px;background:#1f2937;border:1px solid #374151;border-radius:4px">g</kbd></td></tr>
                <tr><td>Close</td><td style="text-align:right"><kbd style="padding:2px 8px;background:#1f2937;border:1px solid #374151;border-radius:4px">esc</kbd></td></tr>
              </table>
            </div>`;
          m.addEventListener('click', () => m.remove());
          document.addEventListener('keydown', function once(ev) {
            if (ev.key === 'Escape') { m.remove(); document.removeEventListener('keydown', once); }
          });
          document.body.appendChild(m);
        }

        // Floating hint + mobile theme toggle
        const hint = document.createElement('div');
        hint.id = 'blog-hint';
        hint.innerHTML = '<kbd>/</kbd> search &nbsp; <kbd>j</kbd>/<kbd>k</kbd> navigate &nbsp; <kbd>?</kbd> help';
        document.body.appendChild(hint);

        const mobTheme = document.createElement('button');
        mobTheme.id = 'mobile-theme-toggle';
        mobTheme.setAttribute('aria-label', 'Toggle theme');
        mobTheme.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>';
        mobTheme.addEventListener('click', () => document.getElementById('theme-toggle')?.click());
        document.body.appendChild(mobTheme);

      } catch (err) {
        console.error('Error fetching posts:', err);
        container.innerHTML = '<div class="p-6 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-2xl border border-red-200 dark:border-red-800">Failed to load posts. Have you configured Supabase?</div>';
      }
    });
  </script>
</body>
</html>
