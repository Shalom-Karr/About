  <!-- ─── SEO meta tags ──────────────────────────────────────────────────
       The IDs are populated dynamically once the post loads. The fallback
       values (and the synchronous bootstrap script below) keep these
       sensible for crawlers that haven't run our async fetch yet. -->

  <!-- Synchronous SEO bootstrap. Runs before any other script and before
       the body parses, so crawlers (and Googlebot's renderer) see a
       unique per-post title / canonical / description immediately —
       even before the async DB fetch completes. The async loader will
       overwrite these later with richer DB content. -->
  <script>
  (function () {
    // Slug can come from the path (/blog/post/<slug>, via the Pages
    // Function rewrite) or the legacy query string (?slug=). Prefer
    // the path so clean URLs work even before scripts run.
    var slug = null;
    var pathMatch = location.pathname.match(/^\/blog\/post\/([^/?#]+)/);
    if (pathMatch) slug = decodeURIComponent(pathMatch[1]);
    if (!slug) {
      var p = new URLSearchParams(location.search);
      if (p.get('slug')) slug = p.get('slug');
    }
    if (!slug) return;

    // Pretty-print the slug as a human title fallback.
    var pretty = slug.split('-').map(function (w) {
      if (!w) return w;
      return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');

    var SITE  = 'Shalom Karr';
    var title = pretty + ' · ' + SITE;
    var desc  = pretty + ' — read the full post on ' + SITE + "'s blog.";
    var canon = 'https://shalomkarr.pages.dev/blog/post/' + encodeURIComponent(slug);

    document.title = title;
    var set = function (id, attr, val) {
      var el = document.getElementById(id);
      if (el) el.setAttribute(attr, val);
    };
    set('seo-description',    'content', desc);
    set('seo-canonical',      'href',    canon);
    set('seo-og-title',       'content', title);
    set('seo-og-description', 'content', desc);
    set('seo-og-url',         'content', canon);
    set('seo-tw-title',       'content', title);
    set('seo-tw-description', 'content', desc);
  })();
  </script>

  <script type="module">import { supabase } from "/supabase-client.js"; window.supabaseClient = supabase;</script><script src="/blog/js/app.js"></script>
  <script>
    // Configure Marked with Highlight.js
    marked.setOptions({
      highlight: function(code, lang) {
        const language = hljs.getLanguage(lang) ? lang : 'plaintext';
        return hljs.highlight(code, { language }).value;
      },
      langPrefix: 'hljs language-'
    });

    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      // Slug can come from /blog/post/<slug> (clean URL) or ?slug= (legacy).
      const pathMatch = window.location.pathname.match(/^\/blog\/post\/([^/?#]+)/);
      const slug = pathMatch ? decodeURIComponent(pathMatch[1]) : urlParams.get('slug');
      const container = document.getElementById('post-container');

      if (!window.supabaseClient) {
          container.innerHTML = '<div class="text-center py-20"><h1 class="text-2xl font-bold text-red-500 mb-4">Configuration Error</h1><p class="text-gray-500">Supabase Environment Variables are missing.</p></div>';
          return;
      }

      if (!slug) {
        container.innerHTML = '<div class="text-center py-20"><h1 class="text-2xl font-bold text-gray-500">No post specified.</h1><a href="/blog/index.html" class="text-blue-600 hover:underline mt-4 inline-block">Go back to blog</a></div>';
        return;
      }

      // --- Fingerprint for anonymous likes ---
      const getFingerprint = () => {
        const stored = localStorage.getItem('blog_fingerprint');
        if (stored) return stored;
        const raw = navigator.userAgent + screen.width + screen.height + (Intl.DateTimeFormat().resolvedOptions().timeZone || '');
        let hash = 0;
        for (let i = 0; i < raw.length; i++) {
          hash = ((hash << 5) - hash) + raw.charCodeAt(i);
          hash |= 0;
        }
        const fp = 'fp_' + Math.abs(hash).toString(36) + '_' + Date.now().toString(36);
        localStorage.setItem('blog_fingerprint', fp);
        return fp;
      };

      try {
        const { data: post, error } = await window.supabaseClient
          .from('posts')
          .select('*')
          .eq('slug', slug)
          .eq('is_published', true)
          .single();

        if (error || !post) throw new Error('Post not found');

        // ─── Apply real SEO from the loaded post ─────────────────────────
        // Admin-set seo_title / seo_description take precedence; otherwise
        // fall back to the post title and excerpt (or a content snippet).
        const SITE  = 'Shalom Karr';
        const title = (post.seo_title       || `${post.title} · ${SITE}`).slice(0, 70);
        const rawDesc =
          (post.seo_description ||
           post.excerpt ||
           (post.content_md || '').replace(/[#*_`>\-\[\]()]/g, '').slice(0, 200));
        const desc  = rawDesc.replace(/\s+/g, ' ').trim().slice(0, 200);
        const canon = `https://shalomkarr.pages.dev/blog/post/${encodeURIComponent(slug)}`;
        const image = post.image_url || 'https://shalomkarr.pages.dev/img/ShalomProfessional.jpg';

        document.title = title;
        const setMeta = (id, attr, val) => {
          const el = document.getElementById(id);
          if (el) el.setAttribute(attr, val);
        };
        setMeta('seo-description',    'content', desc);
        setMeta('seo-canonical',      'href',    canon);
        setMeta('seo-og-title',       'content', title);
        setMeta('seo-og-description', 'content', desc);
        setMeta('seo-og-url',         'content', canon);
        setMeta('seo-og-image',       'content', image);
        setMeta('seo-tw-title',       'content', title);
        setMeta('seo-tw-description', 'content', desc);
        setMeta('seo-tw-image',       'content', image);

        // JSON-LD Article schema — helps Google show rich results.
        const ldEl = document.getElementById('seo-jsonld');
        if (ldEl) {
          ldEl.textContent = JSON.stringify({
            '@context': 'https://schema.org',
            '@type': 'Article',
            'headline': post.title,
            'description': desc,
            'image': image,
            'mainEntityOfPage': canon,
            'datePublished': post.created_at || undefined,
            'dateModified':  post.updated_at || post.created_at || undefined,
            'author':    { '@type': 'Person',       'name': SITE, 'url': 'https://shalomkarr.pages.dev/' },
            'publisher': { '@type': 'Organization', 'name': SITE,
                           'logo': { '@type': 'ImageObject', 'url': 'https://shalomkarr.pages.dev/img/ShalomProfessional.jpg' } },
            'keywords': (post.tags || []).join(', ') || undefined,
          });
        }

        // Escape untrusted DB fields to prevent stored XSS
        const esc = (s) => String(s ?? '').replace(/[&<>"']/g,
          c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

        // Sanitize the rendered markdown HTML
        const rawHtml = marked.parse(post.content_md || '');
        const htmlContent = (typeof DOMPurify !== 'undefined')
          ? DOMPurify.sanitize(rawHtml, { ADD_ATTR: ['target', 'rel'] })
          : rawHtml;

        const wordCount = (post.content_md || '').split(/\s+/).length;
        const readingTime = Math.max(1, Math.ceil(wordCount / 200));

        const tagsHtml = post.tags && post.tags.length > 0
          ? post.tags.map(t => `<a href="/blog/index.html?tag=${encodeURIComponent(t)}" class="bg-blue-50 hover:bg-blue-100 text-blue-600 border border-blue-200 dark:bg-blue-900/30 dark:hover:bg-blue-900/60 dark:text-blue-300 dark:border-blue-800/50 text-xs font-semibold px-2.5 py-1 rounded-md tracking-wide uppercase transition-colors shadow-sm inline-block transform hover:-translate-y-0.5 cursor-pointer">${esc(t)}</a>`).join(' ')
          : '';

        container.innerHTML = `
          <header class="mb-8 pb-8 border-b border-gray-200 dark:border-gray-800 reveal">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-6 leading-tight text-gray-900 dark:text-gray-100">${esc(post.title)}</h1>
            <div class="flex flex-wrap items-center gap-4 text-sm font-medium text-gray-500 dark:text-gray-400">
              <time datetime="${post.created_at}" class="flex items-center">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                ${new Date(post.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}
              </time>
              <span class="flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                ${readingTime} min read
              </span>
              <button id="share-btn" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-xs font-semibold">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                <span id="share-btn-text">Share</span>
              </button>
              ${tagsHtml ? `<div class="flex gap-2 ml-auto flex-wrap">${tagsHtml}</div>` : ''}
            </div>
          </header>

          <div class="prose dark:prose-invert prose-blue max-w-none lg:prose-lg reveal animation-delay-2000 prose-img:rounded-xl prose-img:shadow-lg prose-headings:tracking-tight prose-a:font-semibold prose-pre:border prose-pre:border-gray-200 dark:prose-pre:border-gray-800" id="prose-content">
            ${htmlContent}
          </div>

          <div class="flex items-center gap-6 mt-12 pt-8 border-t border-gray-200 dark:border-gray-800" id="like-section">
            <div class="flex items-center gap-2">
              <div class="flex items-center gap-1 text-blue-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
                <span id="view-count" class="font-semibold">0</span>
              </div>
              <span class="text-sm text-gray-400">views</span>
            </div>
            <div class="flex items-center gap-2">
              <button id="like-btn" class="group flex items-center gap-2 px-5 py-2.5 rounded-full border-2 border-gray-300 dark:border-gray-600 transition-all duration-300 font-bold text-sm text-gray-500 dark:text-gray-400 hover:border-pink-400 hover:text-pink-500">
                <svg id="like-icon" class="w-5 h-5 transition-transform duration-300 group-hover:scale-125" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                </svg>
                <span id="like-count">0</span>
              </button>
              <span class="text-sm text-gray-400" id="like-label">likes</span>
            </div>
          </div>
        `;

        // --- Share Button ---
        const shareBtn = document.getElementById('share-btn');
        const shareBtnText = document.getElementById('share-btn-text');
        if (shareBtn) {
          shareBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href).then(() => {
              shareBtnText.textContent = '✓ Copied!';
              setTimeout(() => { shareBtnText.textContent = 'Share'; }, 2000);
            });
          });
        }

        // --- Table of Contents ---
        const proseEl = document.getElementById('prose-content');
        const slugify = (s) => String(s).toLowerCase().trim()
          .replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');

        if (proseEl) {
          const headings = proseEl.querySelectorAll('h2, h3');
          if (headings.length >= 2) {
            headings.forEach((h, i) => {
              if (!h.id) h.id = slugify(h.textContent) || ('heading-' + i);
            });
            const tocItems = Array.from(headings).map(h => {
              const indent = h.tagName === 'H3' ? 'pl-4 text-gray-500 dark:text-gray-400' : 'font-semibold';
              return `<li><a href="#${h.id}" data-toc class="toc-link block py-1 text-sm ${indent} hover:text-blue-600 dark:hover:text-blue-400 transition-colors">${esc(h.textContent)}</a></li>`;
            }).join('');
            const toc = document.createElement('nav');
            toc.className = 'mb-10 p-6 rounded-2xl bg-gray-100/50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700';
            toc.setAttribute('aria-label', 'Table of contents');
            toc.innerHTML = `<h3 class="font-bold text-sm uppercase tracking-widest text-gray-400 mb-4">Table of Contents</h3><ul class="space-y-1">${tocItems}</ul>`;
            proseEl.prepend(toc);
          }
        }

        // --- Heading anchor links (deep-link + copy to clipboard on click) ---
        if (proseEl) {
          const copyToast = (msg) => {
            const t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:8px;font-family:ui-monospace,monospace;font-size:13px;z-index:200;border:1px solid rgba(139,92,246,.4);box-shadow:0 10px 30px rgba(0,0,0,.5)';
            document.body.appendChild(t);
            setTimeout(() => { t.style.transition = 'opacity .3s'; t.style.opacity = '0'; }, 1400);
            setTimeout(() => t.remove(), 1800);
          };
          proseEl.querySelectorAll('h2, h3').forEach(h => {
            if (!h.id) return;
            const a = document.createElement('a');
            a.href = '#' + h.id;
            a.className = 'heading-anchor';
            a.setAttribute('aria-label', 'Copy link to this section');
            a.textContent = '#';
            h.appendChild(a);
            a.addEventListener('click', (e) => {
              e.preventDefault();
              history.replaceState(null, '', '#' + h.id);
              const url = location.origin + location.pathname + location.search + '#' + h.id;
              (navigator.clipboard?.writeText(url) ?? Promise.resolve()).then(() => copyToast('Section link copied'));
              h.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
          });
        }

        // --- Copy-code button on every <pre> ---
        if (proseEl) {
          proseEl.querySelectorAll('pre').forEach(pre => {
            if (pre.closest('.discord-code-wrapper')) return;
            const codeEl = pre.querySelector('code');
            const langClass = codeEl ? [...codeEl.classList].find(c => c.startsWith('language-')) : null;
            const lang = langClass ? langClass.replace('language-', '') : 'code';

            const wrapper = document.createElement('div');
            wrapper.className = 'discord-code-wrapper';

            const header = document.createElement('div');
            header.className = 'discord-code-header';

            const langSpan = document.createElement('span');
            langSpan.className = 'lang-name';
            langSpan.textContent = lang;

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'copy-code-btn';
            btn.setAttribute('aria-label', 'Copy code');
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy';

            header.appendChild(langSpan);
            header.appendChild(btn);

            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(header);
            wrapper.appendChild(pre);

            btn.addEventListener('click', async () => {
              try {
                await navigator.clipboard.writeText(codeEl ? codeEl.textContent : pre.textContent);
                btn.classList.add('copied');
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied';
                setTimeout(() => {
                  btn.classList.remove('copied');
                  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy';
                }, 1500);
              } catch (e) { /* ignore */ }
            });
          });
        }

        // --- Active TOC section highlighting via IntersectionObserver ---
        if (proseEl && 'IntersectionObserver' in window) {
          const tocLinks = Array.from(document.querySelectorAll('[data-toc]'));
          const headingMap = new Map();
          tocLinks.forEach(l => {
            const id = l.getAttribute('href').slice(1);
            const el = document.getElementById(id);
            if (el) headingMap.set(el, l);
          });
          const setActive = (link) => {
            tocLinks.forEach(l => l.classList.remove('text-blue-600', 'dark:text-blue-400'));
            if (link) link.classList.add('text-blue-600', 'dark:text-blue-400');
          };
          const obs = new IntersectionObserver((entries) => {
            const visible = entries.filter(e => e.isIntersecting)
              .sort((a, b) => a.target.offsetTop - b.target.offsetTop);
            if (visible[0]) setActive(headingMap.get(visible[0].target));
          }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });
          headingMap.forEach((_, h) => obs.observe(h));
        }

        // --- Prev / Next post navigation ---
        try {
          const { data: siblings } = await window.supabaseClient
            .from('posts')
            .select('slug, title, created_at')
            .eq('is_published', true)
            .order('created_at', { ascending: false });
          if (siblings && siblings.length) {
            const idx = siblings.findIndex(p => p.slug === post.slug);
            const next = idx > 0 ? siblings[idx - 1] : null;     // newer
            const prev = idx >= 0 && idx < siblings.length - 1 ? siblings[idx + 1] : null; // older
            if (prev || next) {
              const nav = document.createElement('nav');
              nav.className = 'grid gap-4 md:grid-cols-2 mt-16 mb-8';
              nav.setAttribute('aria-label', 'Post navigation');
              const card = (p, dir) => {
                if (!p) return '<div></div>';
                const arrow = dir === 'prev' ? '←' : '→';
                const label = dir === 'prev' ? 'Older post' : 'Newer post';
                const align = dir === 'prev' ? '' : 'md:text-right md:justify-end md:flex-row-reverse';
                return `<a href="/blog/post/${encodeURIComponent(p.slug)}" class="post-nav-card ${align}">
                  <span class="text-2xl text-purple-500">${arrow}</span>
                  <span class="flex-1 min-w-0">
                    <span class="block text-xs uppercase tracking-widest text-gray-500 dark:text-gray-400 mb-1">${label}</span>
                    <span class="block font-bold text-gray-900 dark:text-gray-100 truncate">${esc(p.title)}</span>
                  </span>
                </a>`;
              };
              nav.innerHTML = card(prev, 'prev') + card(next, 'next');
              const likeSection = document.getElementById('like-section');
              if (likeSection && likeSection.parentNode) {
                likeSection.parentNode.insertBefore(nav, likeSection.nextSibling);
              } else {
                container.appendChild(nav);
              }

              // Store for keyboard nav
              window.__postNav = { prev, next };
            }
          }
        } catch (e) { console.warn('Prev/next fetch failed', e); }

        // --- Keyboard shortcuts on post pages ---
        document.addEventListener('keydown', (e) => {
          const tag = (e.target && e.target.tagName) || '';
          const editable = /^(INPUT|TEXTAREA|SELECT)$/.test(tag) || (e.target && e.target.isContentEditable);
          if (editable) return;
          // Esc → back to blog index
          if (e.key === 'Escape') {
            location.href = '/blog/index.html';
            return;
          }
          // j / k → older / newer post
          if (e.key === 'j' && window.__postNav?.prev) {
            e.preventDefault();
            location.href = '/blog/post/' + encodeURIComponent(window.__postNav.prev.slug);
          } else if (e.key === 'k' && window.__postNav?.next) {
            e.preventDefault();
            location.href = '/blog/post/' + encodeURIComponent(window.__postNav.next.slug);
          } else if (e.key === 'l' && document.getElementById('like-btn')) {
            e.preventDefault();
            document.getElementById('like-btn').click();
          } else if (e.key === 't') {
            e.preventDefault();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        });

        // --- Floating hint badge ---
        const hint = document.createElement('div');
        hint.id = 'blog-hint';
        hint.innerHTML = '<kbd>j</kbd>/<kbd>k</kbd> post &nbsp; <kbd>l</kbd> like &nbsp; <kbd>esc</kbd> back';
        document.body.appendChild(hint);


        // --- Like Button and View Count Logic ---
        const fp = getFingerprint();
        const likeBtn = document.getElementById('like-btn');
        const likeIcon = document.getElementById('like-icon');
        const likeCountEl = document.getElementById('like-count');
        const viewCountEl = document.getElementById('view-count');

        // Fetch like count, user like status, and view count
        const [{ count: totalLikes }, { data: userLike }, { data: analytics }] = await Promise.all([
          window.supabaseClient.from('post_likes').select('*', { count: 'exact', head: true }).eq('post_id', post.id),
          window.supabaseClient.from('post_likes').select('id').eq('post_id', post.id).eq('fingerprint', fp).maybeSingle(),
          window.supabaseClient.from('blog_post_analytics').select('total_views').eq('id', post.id).maybeSingle()
        ]);

        let liked = !!userLike;
        let currentCount = totalLikes || 0;
        const totalViews = analytics?.total_views || 0;

        // Update view count display
        if (viewCountEl) {
          viewCountEl.textContent = totalViews.toLocaleString();
        }

        // ─── Blog post analytics tracker ───────────────────────────────
        // Records: initial page view, time-on-page (visible time only),
        // and max scroll depth. Designed to behave well:
        //   - No console spam (was logging every second)
        //   - Pauses time accumulation when the tab is hidden, so a
        //     reader who tabs away for 10 minutes doesn't show as
        //     having "read" for 10 minutes.
        //   - Throttles DB writes to once every 15s instead of every 5s,
        //     and uses navigator.sendBeacon for the final flush on
        //     pagehide so the most accurate duration is always saved.
        //   - Drops the third-party api.ipify.org dependency. IP is
        //     captured server-side via x-forwarded-for headers (Supabase
        //     edge); the column stays nullable on the client.
        async function startBlogTracking(postObj, fingerPrint) {
          const userAgent = navigator.userAgent;
          const referrer  = document.referrer || '';
          const postSlug  = postObj.slug;
          const postId    = postObj.id;

          const { data: viewSession, error: viewError } = await window.supabaseClient
            .from('blog_post_views')
            .insert({
              post_id: postId,
              post_slug: postSlug,
              fingerprint: fingerPrint,
              ip_address: null,
              user_agent: userAgent,
              referrer: referrer,
              view_duration_seconds: 0,
            })
            .select('id')
            .single();

          if (viewError || !viewSession) return;
          const viewId = viewSession.id;

          // Visible-time accumulator (in seconds).
          let secondsVisible = 0;
          let scrollDepth    = 0;
          let lastTick       = Date.now();

          const updateScrollDepth = () => {
            const h    = document.documentElement;
            const max  = Math.max(0, h.scrollHeight - h.clientHeight);
            const pct  = max ? Math.round((h.scrollTop / max) * 100) : 0;
            if (pct > scrollDepth) scrollDepth = Math.min(100, pct);
          };
          window.addEventListener('scroll', updateScrollDepth, { passive: true });

          const tick = setInterval(() => {
            const now = Date.now();
            const elapsed = Math.round((now - lastTick) / 1000);
            lastTick = now;
            if (document.visibilityState === 'visible') {
              secondsVisible += elapsed;
            }
          }, 1000);

          // Throttled DB write — runs every 15s, not every 5s.
          const flushInterval = setInterval(async () => {
            try {
              await window.supabaseClient
                .from('blog_post_views')
                .update({
                  view_duration_seconds: secondsVisible,
                  updated_at: new Date().toISOString(),
                })
                .eq('id', viewId);

              const { data: latestAnalytics } = await window.supabaseClient
                .from('blog_post_analytics')
                .select('total_views')
                .eq('id', postId)
                .maybeSingle();
              if (latestAnalytics && viewCountEl) {
                viewCountEl.textContent = latestAnalytics.total_views.toLocaleString();
              }
            } catch (e) { /* swallow — next tick will retry */ }
          }, 15000);

          // Reset the lastTick whenever visibility changes so we don't
          // accumulate time spent in a hidden tab.
          document.addEventListener('visibilitychange', () => {
            lastTick = Date.now();
          });

          // Final flush on pagehide — fetch with keepalive: true survives
          // navigation, so the most accurate duration is always recorded.
          // Supabase JS exposes the URL + anon key on the client instance.
          let alreadyFlushed = false;
          const finalFlush = () => {
            if (alreadyFlushed) return;
            alreadyFlushed = true;
            clearInterval(tick);
            clearInterval(flushInterval);
            const supaUrl = window.supabaseClient.supabaseUrl;
            const supaKey = window.supabaseClient.supabaseKey;
            if (!supaUrl || !supaKey) return;
            try {
              fetch(`${supaUrl}/rest/v1/blog_post_views?id=eq.${viewId}`, {
                method: 'PATCH',
                keepalive: true,
                headers: {
                  'Content-Type': 'application/json',
                  'apikey':        supaKey,
                  'Authorization': `Bearer ${supaKey}`,
                  'Prefer':        'return=minimal',
                },
                body: JSON.stringify({
                  view_duration_seconds: secondsVisible,
                  updated_at: new Date().toISOString(),
                }),
              }).catch(() => {});
            } catch (e) { /* best-effort flush — swallow */ }
          };
          window.addEventListener('pagehide', finalFlush);
          // visibilitychange -> hidden also fires reliably on mobile.
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') finalFlush();
          });
        }

        // Start the tracking logic
        startBlogTracking(post, fp);

        const updateLikeUI = () => {
          if (likeCountEl) likeCountEl.textContent = currentCount;
          if (liked) {
            likeBtn.className = 'group flex items-center gap-2 px-5 py-2.5 rounded-full border-2 border-pink-500 text-pink-500 transition-all duration-300 font-bold text-sm';
            likeIcon.setAttribute('fill', 'currentColor');
            likeIcon.setAttribute('stroke', 'none');
          } else {
            likeBtn.className = 'group flex items-center gap-2 px-5 py-2.5 rounded-full border-2 border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 transition-all duration-300 font-bold text-sm hover:border-pink-400 hover:text-pink-500';
            likeIcon.setAttribute('fill', 'none');
            likeIcon.setAttribute('stroke', 'currentColor');
          }
        };

        updateLikeUI();

        if (likeBtn) {
          likeBtn.addEventListener('click', async () => {
            if (!liked) {
              liked = true;
              currentCount++;
              updateLikeUI();
              if (typeof gsap !== 'undefined') {
                gsap.fromTo(likeIcon, { scale: 1 }, { scale: 1.4, duration: 0.15, yoyo: true, repeat: 1, ease: 'power2.out' });
              }
              const { error } = await window.supabaseClient.from('post_likes').insert({ post_id: post.id, fingerprint: fp });
              if (error) { liked = false; currentCount = Math.max(0, currentCount - 1); updateLikeUI(); }
            } else {
              liked = false;
              currentCount = Math.max(0, currentCount - 1);
              updateLikeUI();
              const { error } = await window.supabaseClient.from('post_likes').delete().eq('post_id', post.id).eq('fingerprint', fp);
              if (error) { liked = true; currentCount++; updateLikeUI(); }
            }
          });
        }
        
        
        if (window.initScrollAnimations) window.initScrollAnimations();

      } catch (err) {
        console.error('Error fetching post:', err);
        container.innerHTML = '<div class="text-center py-20"><h1 class="text-5xl font-extrabold mb-4 text-gray-900 dark:text-white">404</h1><p class="text-xl text-gray-500 mb-8">The post could not be found or has been removed.</p><a href="/blog/index.html" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors">Return to Blog</a></div>';
      }
    });
  </script>
</body>
</html>
